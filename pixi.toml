[workspace]
authors = ["Andrew Suprun <andrew.suprun@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "Game-Of-Stones"
platforms = ["osx-arm64"]
version = "1.0.0"

[tasks]
format = "pixi run mojo format . -l 180"

bench-board = "pixi run mojo -D ASSERT=none bench_board.mojo"
bench-connect6 = "pixi run mojo -D ASSERT=none bench_connect6.mojo"
bench-gomoku = "pixi run mojo -D ASSERT=none bench_gomoku.mojo"
bench-heap = "pixi run mojo -D ASSERT=none bench_heap.mojo"
bench-negamax = "pixi run mojo -D ASSERT=none bench_negamax.mojo"
bench-mcts = "pixi run mojo -D ASSERT=none bench_mcts.mojo"
bench-reduce = "pixi run mojo -D ASSERT=none bench_reduce.mojo"
benches = { depends-on = ["bench-heap", "bench-board", "bench-connect6", "bench-gomoku", "bench-negamax", "bench-mcts", "bench-reduce"] }


test-heap = "pixi run mojo -D ASSERT=all test_heap.mojo"
test-board = "pixi run mojo -D ASSERT=all test_board.mojo"
test-mcts-connect6 = "pixi run mojo -D ASSERT=all test_mcts_connect6.mojo"
test-mcts-gomoku = "pixi run mojo -D ASSERT=all test_mcts_gomoku.mojo"
test-negamax = "pixi run mojo -D ASSERT=all test_negamax.mojo"
test-search = "pixi run mojo -D ASSERT=all test_search.mojo"
tests = { depends-on = ["test-heap", "test-board", "test-mcts-connect6", "test-mcts-gomoku", "test-negamax", "test-search"] }

[dependencies]
pygame = ">=2.6.1,<3"
mojo = ">=1.0.0b3.dev2026063006,<2"
